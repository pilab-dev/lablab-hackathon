  /valuation/crypto/{symbol}/nvt:
    get:
      tags:
        - Crypto
      summary: Get NVT ratio for crypto
      description: >-
        Calculate NVT (Network Value to Transactions) ratio for a
        cryptocurrency.


        **What is NVT?**

        NVT is like P/E ratio for crypto. It compares network value (market cap)
        to

        transaction volume on the blockchain.


        **Interpretation:**

        - High NVT (>90): Network is overvalued relative to usage

        - Normal NVT (50-90): Fair valuation

        - Low NVT (<50): Network is undervalued relative to usage


        **Note:** NVT works best for established chains like BTC, ETH with
        meaningful on-chain activity.
      operationId: get_nvt_ratio_valuation_crypto__symbol__nvt_get
      parameters:
        - name: symbol
          in: path
          required: true
          schema:
            type: string
            description: Crypto symbol (e.g., BTC, ETH)
            title: Symbol
          description: Crypto symbol (e.g., BTC, ETH)
