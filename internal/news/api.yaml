openapi: 3.1.0
info:
  title: PRISM API
  description: >
    
    ## PRISM - AI/Agent-Native Financial Data API


    Unified identity, pricing, venues, prediction markets, sports, and tradfi
    data

    with LLM-safe, structured responses.


    - Base path: `/`

    - All responses are structured for agentic use

    - Authentication optional (not enforced by default)
  version: 4.12.0
paths:
  /auth/keys:
    post:
      tags:
        - Developer
      summary: Create Api Key
      description: >-
        Create a new API key.


        Returns the full API key ONCE. Store it securely - it cannot be
        retrieved again.


        - **Admin** (X-Admin-Key): may set any tier.

        - **Clerk JWT** (Authorization: Bearer &lt;token&gt;): tier from Clerk
        metadata (e.g. prism_tier), owner_id/owner_email set; per-user key
        limits apply.

        - **Anonymous**: free tier only.
      operationId: create_api_key_auth_keys_post
      parameters:
        - name: x-admin-key
          in: header
          required: false
          schema:
            type: string
            title: X-Admin-Key
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateKeyRequest"
      responses:
        "201":
          description: Successful Response
          content:
            application/json:
              schema: {}
        "422":
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HTTPValidationError"
  /auth/keys/instant:
    get:
      tags:
        - Developer
      summary: Get a free API key (no signup)
      description: Returns a new API key with agent tier (5 req/min, 100/day). No
        authentication required. Rate limited to 3 keys per IP per hour. Key
        expires in 7 days. For agents and scripts.
      operationId: get_instant_key_auth_keys_instant_get
      responses:
        "200":
          description: Successful Response
          content:
            application/json:
              schema: {}
  /auth/my/keys:
    get:
      tags:
        - Developer
      summary: List My Keys
      description: List API keys owned by the current user (Clerk JWT required).
      operationId: list_my_keys_auth_my_keys_get
      security:
        - HTTPBearer: []
      parameters:
        - name: include_revoked
          in: query
          required: false
          schema:
            type: boolean
            description: Include revoked keys
            default: false
            title: Include Revoked
          description: Include revoked keys
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            maximum: 100
            minimum: 1
            default: 50
            title: Limit
      responses:
        "200":
          description: Successful Response
          content:
            application/json:
              schema: {}
        "422":
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HTTPValidationError"
  /auth/my/keys/{key_id}:
    delete:
      tags:
        - Developer
      summary: Revoke My Key
      description: Revoke one of your API keys. Only keys you own can be revoked.
      operationId: revoke_my_key_auth_my_keys__key_id__delete
      security:
        - HTTPBearer: []
      parameters:
        - name: key_id
          in: path
          required: true
          schema:
            type: string
            title: Key Id
      responses:
        "200":
          description: Successful Response
          content:
            application/json:
              schema: {}
        "422":
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HTTPValidationError"
  /auth/my/keys/{key_id}/rotate:
    post:
      tags:
        - Developer
      summary: Rotate My Key
      description: Rotate one of your API keys. Returns the new key ONCE - store it
        securely.
      operationId: rotate_my_key_auth_my_keys__key_id__rotate_post
      security:
        - HTTPBearer: []
      parameters:
        - name: key_id
          in: path
          required: true
          schema:
            type: string
            title: Key Id
      responses:
        "200":
          description: Successful Response
          content:
            application/json:
              schema: {}
        "422":
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HTTPValidationError"
  /auth/my/usage:
    get:
      tags:
        - Developer
      summary: Get My Usage
      description: Aggregate usage across all of your API keys (Clerk JWT required).
      operationId: get_my_usage_auth_my_usage_get
      responses:
        "200":
          description: Successful Response
          content:
            application/json:
              schema: {}
      security:
        - HTTPBearer: []
  /auth/keys/link:
    post:
      tags:
        - Developer
      summary: Link Key To User
      description: >-
        Link an ownerless API key to the current user account.


        Requires: Clerk JWT (Authorization: Bearer) + X-API-Key (the key to
        link).

        The key must have owner_id = null (ownerless). After linking, the key
        will appear

        in the user's dashboard and usage/logs will be attributed to them.


        Returns updated key info.
      operationId: link_key_to_user_auth_keys_link_post
      security:
        - HTTPBearer: []
      parameters:
        - name: name
          in: query
          required: false
          schema:
            type: string
            title: Name
        - name: X-API-Key
          in: header
          required: false
          schema:
            type: string
            title: X-Api-Key
      responses:
        "200":
          description: Successful Response
          content:
            application/json:
              schema: {}
        "422":
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HTTPValidationError"
  /auth/usage:
    get:
      tags:
        - Developer
      summary: Get Usage Stats
      description: |-
        Get usage statistics for the current API key.

        Requires authentication via X-API-Key header.
      operationId: get_usage_stats_auth_usage_get
      responses:
        "200":
          description: Successful Response
          content:
            application/json:
              schema: {}
      security:
        - APIKeyHeader: []
  /auth/verify:
    post:
      tags:
        - Developer
      summary: Verify Api Key
      description: |-
        Verify if an API key is valid.

        Returns key info if valid, error message if not.
      operationId: verify_api_key_auth_verify_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VerifyKeyRequest"
        required: true
      responses:
        "200":
          description: Successful Response
          content:
            application/json:
              schema: {}
        "422":
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HTTPValidationError"
  /auth/tiers:
    get:
      tags:
        - Developer
      summary: Get Tiers
      description: |-
        Get available rate limit tiers.

        Shows the rate limits for each tier to help users choose.
      operationId: get_tiers_auth_tiers_get
      responses:
        "200":
          description: Successful Response
          content:
            application/json:
              schema: {}
  /assets/search:
    get:
      tags:
        - Assets
      summary: Search Assets
      description: Search for any asset. Use local_only=true for fast local-only
        search (no external APIs).
      operationId: search_assets_assets_search_get
      parameters:
        - name: q
          in: query
          required: true
          schema:
            type: string
            minLength: 1
            maxLength: 50
            description: Search query (symbol or name)
            title: Q
          description: Search query (symbol or name)
        - name: local_only
          in: query
          required: false
          schema:
            type: boolean
            description: If true, only search local DB (no external APIs, fast)
            default: false
            title: Local Only
          description: If true, only search local DB (no external APIs, fast)
        - name: asset_type
          in: query
          required: false
          schema:
            type: string
            description: "Filter by type: token, stock, etf"
            title: Asset Type
          description: "Filter by type: token, stock, etf"
        - name: category
          in: query
          required: false
          schema:
            type: string
            description: "Filter by category code: TOKEN, STOCK, ETF, etc."
            title: Category
          description: "Filter by category code: TOKEN, STOCK, ETF, etc."
        - name: chain
          in: query
          required: false
          schema:
            type: string
            description: "Filter by chain: ethereum, arbitrum, solana, etc."
            title: Chain
          description: "Filter by chain: ethereum, arbitrum, solana, etc."
        - name: auto_register
          in: query
          required: false
          schema:
            type: boolean
            description: Auto-register new assets if found externally (ignored when
              local_only=true)
            default: true
            title: Auto Register
          description: Auto-register new assets if found externally (ignored when
            local_only=true)
        - name: max_age
          in: query
          required: false
          schema:
            type: integer
            description: Max data age in seconds before refresh (default 5 min)
            default: 300
            title: Max Age
          description: Max data age in seconds before refresh (default 5 min)
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            maximum: 50
            minimum: 1
            description: Max results (for local_only, max 50)
            default: 20
            title: Limit
          description: Max results (for local_only, max 50)
      responses:
        "200":
          description: Successful Response
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
                title: Response Search Assets Assets Search Get
        "422":
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HTTPValidationError"
  /assets/all:
    get:
      tags:
        - Assets
      summary: List All Assets
      description: List all monitored assets in the registry.
      operationId: list_all_assets_assets_all_get
      parameters:
        - name: asset_type
          in: query
          required: false
          schema:
            type: string
            description: "Filter: crypto, stock, etf"
            title: Asset Type
          description: "Filter: crypto, stock, etf"
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            maximum: 500
            minimum: 1
            description: Number of assets to return
            default: 50
            title: Limit
          description: Number of assets to return
        - name: offset
          in: query
          required: false
          schema:
            type: integer
            minimum: 0
            description: Pagination offset
            default: 0
            title: Offset
          description: Pagination offset
        - name: order_by
          in: query
          required: false
          schema:
            type: string
            description: "Order: created_at, lookup_count, market_cap, symbol"
            default: market_cap
            title: Order By
          description: "Order: created_at, lookup_count, market_cap, symbol"
        - name: include_sparklines
          in: query
          required: false
          schema:
            type: boolean
            description: Include 7-day sparklines (slower)
            default: false
            title: Include Sparklines
          description: Include 7-day sparklines (slower)
      responses:
        "200":
          description: Successful Response
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
                title: Response List All Assets Assets All Get
        "422":
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HTTPValidationError"
  /assets/stats:
    get:
      tags:
        - Assets
      summary: Get Registry Stats
      description: Get statistics about the asset registry.
      operationId: get_registry_stats_assets_stats_get
      responses:
        "200":
          description: Successful Response
          content:
            application/json:
              schema:
                additionalProperties: true
                type: object
                title: Response Get Registry Stats Assets Stats Get
  /assets/cache:
    get:
      tags:
        - Assets
      summary: Cache Status
      description: Get cache statistics and health metrics.
      operationId: cache_status_assets_cache_get
      responses:
        "200":
          description: Successful Response
          content:
            application/json:
              schema: {}
  /assets/{symbol}/prices:
    get:
      tags:
        - Assets
      summary: Get Price History
      description: Get OHLCV price history for charting.
      operationId: get_price_history_assets__symbol__prices_get
      parameters:
        - name: symbol
          in: path
          required: true
          schema:
            type: string
            title: Symbol
        - name: interval
          in: query
          required: false
          schema:
            type: string
            description: "Candle interval: 1h, 4h, 1d"
            default: 4h
            title: Interval
          description: "Candle interval: 1h, 4h, 1d"
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            maximum: 500
            minimum: 1
            description: Number of candles to return
            default: 100
            title: Limit
          description: Number of candles to return
        - name: asset_type
          in: query
          required: false
          schema:
            type: string
            description: "Asset type: crypto or stock"
            default: crypto
            title: Asset Type
          description: "Asset type: crypto or stock"
      responses:
        "200":
          description: Successful Response
          content:
            application/json:
              schema: {}
        "422":
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HTTPValidationError"
  /assets/{identifier}:
    get:
      tags:
        - Assets
      summary: Get Asset By Identifier
      description: |-
        Get asset by hash, canonical ID, or symbol.

        Auto-detects format:
        - S + 20 hex chars → hash lookup
        - asset-... → canonical ID lookup
        - otherwise → symbol lookup (first match in registry)
      operationId: get_asset_by_identifier_assets__identifier__get
      parameters:
        - name: identifier
          in: path
          required: true
          schema:
            type: string
            description: Hash (S + 20 hex), canonical_id (asset-...), or symbol
            title: Identifier
          description: Hash (S + 20 hex), canonical_id (asset-...), or symbol
      responses:
        "200":
          description: Successful Response
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
                title: Response Get Asset By Identifier Assets  Identifier  Get
        "422":
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HTTPValidationError"
  /chains:
    get:
      tags:
        - Crypto
      summary: List Chains
      description: |-
        List all supported blockchain networks.

        Returns chain IDs, display names, and external API identifiers.
      operationId: list_chains_chains_get
      responses:
        "200":
          description: Successful Response
          content:
            application/json:
              schema: {}
  /search:
    get:
      tags:
        - Search
      summary: Search Assets
      description: >-
        Unified asset search with cursor pagination.


        Searches across crypto and stock assets with flexible filtering.

        Returns self-describing results with cursor-based pagination.


        Args:
            q: Search query (symbol, name, or contract address).
               Empty string returns all assets sorted by market cap.
            type: Asset type filter - "crypto", "stock", or "all" (default)
            chain: Blockchain filter for crypto - "ethereum", "base", "solana", etc.
            include: Comma-separated fields to include - "price", "venues", "family"
            limit: Results per page (1-100, default 50)
            cursor: Pagination cursor from previous response's next_cursor

        Returns:
            {
                "object": "list",
                "query": "btc",
                "data": [{"object": "asset", "symbol": "BTC", ...}],
                "pagination": {
                    "total": 150,
                    "limit": 50,
                    "has_more": true,
                    "next_cursor": "eyJvZmZzZXQiOjUwfQ==",
                    "prev_cursor": null
                },
                "conflicts": [...],  // Ambiguous symbols (MON, COIN, etc.)
                "search_time_ms": 45,
                "cached": false
            }

        Examples:
            GET /search?q=bitcoin           - Search by name
            GET /search?q=BTC&type=crypto   - Crypto only
            GET /search?type=stock&limit=20 - List stocks
            GET /search?q=0x1234...         - Contract address lookup
            GET /search?chain=base&limit=10 - Base chain tokens

        Cache: 5 minutes (300 seconds)
      operationId: search_assets_search_get
      parameters:
        - name: q
          in: query
          required: false
          schema:
            type: string
            description: Search query (symbol, name, or contract). Empty = list all.
            default: ""
            title: Q
          description: Search query (symbol, name, or contract). Empty = list all.
        - name: type
          in: query
          required: false
          schema:
            type: string
            description: "Filter: crypto, stock, all"
            title: Type
          description: "Filter: crypto, stock, all"
        - name: category
          in: query
          required: false
          schema:
            type: string
            description: "Filter by category code: CRPT, STCK, ETFS, etc."
            title: Category
          description: "Filter by category code: CRPT, STCK, ETFS, etc."
        - name: chain
          in: query
          required: false
          schema:
            type: string
            description: Filter by chain for crypto
            title: Chain
          description: Filter by chain for crypto
        - name: include
          in: query
          required: false
          schema:
            type: string
            description: "Include: price,venues,family"
            default: price
            title: Include
          description: "Include: price,venues,family"
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            maximum: 100
            minimum: 1
            description: Results per page
            default: 50
            title: Limit
          description: Results per page
        - name: cursor
          in: query
          required: false
          schema:
            type: string
            description: Pagination cursor from previous response
            title: Cursor
          description: Pagination cursor from previous response
      responses:
        "200":
          description: Successful Response
          content:
            application/json:
              schema: {}
        "422":
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HTTPValidationError"
  /contracts/{chain}/{address}:
    get:
      tags:
        - Search
      summary: Get Contract
      description: |-
        Contract address lookup.

        Pre-indexed contracts return in ~5ms.
        Falls back to live API if not indexed.
      operationId: get_contract_contracts__chain___address__get
      parameters:
        - name: chain
          in: path
          required: true
          schema:
            type: string
            title: Chain
        - name: address
          in: path
          required: true
          schema:
            type: string
            title: Address
      responses:
        "200":
          description: Successful Response
          content:
            application/json:
              schema: {}
        "422":
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HTTPValidationError"
  /agent/resolve:
    post:
      tags:
        - Search
      summary: Batch Resolve
      description: |-
        Batch resolve multiple assets for AI agents.

        Resolves up to 50 queries in parallel.

        **Example Request:**
        ```json
        {
            "queries": ["BTC", "ETH", "AAPL"],
            "include": ["price", "venues"],
            "context": "crypto"
        }
        ```
      operationId: batch_resolve_agent_resolve_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/app__api__search__BatchResolveRequest"
        required: true
      responses:
        "200":
          description: Successful Response
          content:
            application/json:
              schema: {}
        "422":
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HTTPValidationError"
  /resolve/{symbol}:
    get:
      tags:
        - Resolution
      summary: Resolve Symbol
      description: >-
        Resolve any symbol to canonical asset data.


        Returns confidence score and warnings for trading safety.

        Use ?expand=venues,family to include related data.

        Use ?live_price=true for multi-source consensus price (Binance,
        Coinbase, OKX, etc.).


        **Resolution Layers:**

        1. Cache (80% of queries, <1ms)

        2. Deterministic match (15%, <3ms)

        3. Priority scoring (4%, <10ms)

        4. LLM fallback (1%, <200ms)


        **Examples:**

        - `/resolve/BTC` → Bitcoin with venues

        - `/resolve/AAPL?context=stock` → Apple Inc.

        - `/resolve/BTC?expand=family` → Bitcoin + WBTC, cbBTC

        - `/resolve/BTC?live_price=true` → Bitcoin with consensus-validated
        price
      operationId: resolve_symbol_resolve__symbol__get
      parameters:
        - name: symbol
          in: path
          required: true
          schema:
            type: string
            title: Symbol
        - name: context
          in: query
          required: false
          schema:
            type: string
            description: "Context hint: crypto, stock, trading, research"
            title: Context
          description: "Context hint: crypto, stock, trading, research"
        - name: chain
          in: query
          required: false
          schema:
            type: string
            description: "Chain filter: ethereum, base, solana"
            title: Chain
          description: "Chain filter: ethereum, base, solana"
        - name: venue
          in: query
          required: false
          schema:
            type: string
            description: "Venue filter: hyperliquid, alpaca"
            title: Venue
          description: "Venue filter: hyperliquid, alpaca"
        - name: expand
          in: query
          required: false
          schema:
            type: string
            description: "Fields to expand: venues, family, alternatives"
            default: venues
            title: Expand
          description: "Fields to expand: venues, family, alternatives"
        - name: use_llm
          in: query
          required: false
          schema:
            type: boolean
            description: Force LLM disambiguation
            default: false
            title: Use Llm
          description: Force LLM disambiguation
        - name: user_id
          in: query
          required: false
          schema:
            type: string
            description: User ID for personalization
            title: User Id
          description: User ID for personalization
        - name: live_price
          in: query
          required: false
          schema:
            type: boolean
            description: If true, overlay consensus price from multiple sources (slower)
            default: false
            title: Live Price
          description: If true, overlay consensus price from multiple sources (slower)
      responses:
        "200":
          description: Successful Response
          content:
            application/json:
              schema: {}
        "422":
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HTTPValidationError"
  /resolve/batch:
    post:
      tags:
        - Resolution
      summary: Resolve Batch
      description: |-
        Parallel resolution for multiple symbols.

        Resolves up to 100 symbols in parallel for screeners and dashboards.

        **Example Request:**
        ```json
        {
            "symbols": ["BTC", "ETH", "SOL", "AAPL", "TSLA"],
            "context": "trading",
            "expand": "venues"
        }
        ```
      operationId: resolve_batch_resolve_batch_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/app__api__resolve__BatchResolveRequest"
        required: true
      responses:
        "200":
          description: Successful Response
          content:
            application/json:
              schema: {}
        "422":
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HTTPValidationError"
  /resolve/family/{family_id}:
    get:
      tags:
        - Resolution
      summary: Get Family
      description: |-
        Get full family details with all members.

        **Example:**
        `/resolve/family/BTC` returns:
        - BTC (native)
        - WBTC (Ethereum wrapped)
        - cbBTC (Base wrapped)
        - tBTC (threshold network)
      operationId: get_family_resolve_family__family_id__get
      parameters:
        - name: family_id
          in: path
          required: true
          schema:
            type: string
            title: Family Id
        - name: expand
          in: query
          required: false
          schema:
            type: string
            description: "Fields to expand: members, venues"
            default: members
            title: Expand
          description: "Fields to expand: members, venues"
      responses:
        "200":
          description: Successful Response
          content:
            application/json:
              schema: {}
        "422":
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HTTPValidationError"
  /resolve/venues/{symbol}:
    get:
      tags:
        - Resolution
      summary: Get Venues
      description: |-
        Get all available trading venues for a symbol.

        Returns venues grouped by type:
        - CEX spot (Binance, Coinbase, OKX)
        - CEX perp (Binance Futures, OKX Futures)
        - DEX spot (Uniswap, Jupiter, Aerodrome)
        - DEX perp (Hyperliquid, Apex, Avantis)
        - Brokers (Alpaca, IBKR, Robinhood) - for stocks
      operationId: get_venues_resolve_venues__symbol__get
      parameters:
        - name: symbol
          in: path
          required: true
          schema:
            type: string
            title: Symbol
        - name: asset_type
          in: query
          required: false
          schema:
            type: string
            description: "Asset type: crypto, stock"
