components:
  schemas:
    AssetType:
      type: string
      enum:
        - stock
        - crypto
        - auto
      title: AssetType
      description: Asset type for risk calculations.
    BatchTechnicalsRequest:
      properties:
        symbols:
          items:
            type: string
          type: array
          maxItems: 50
          title: Symbols
          description: List of symbols (max 50)
        timeframe:
          type: string
          title: Timeframe
          description: Timeframe for analysis
          default: daily
        indicators:
          anyOf:
            - items:
                type: string
              type: array
            - type: "null"
          title: Indicators
          description: "Specific indicators to return (default: all)"
      type: object
      required:
        - symbols
      title: BatchTechnicalsRequest
      description: Request model for batch technical analysis.
    CreateKeyRequest:
      properties:
        name:
          anyOf:
            - type: string
              maxLength: 255
            - type: "null"
          title: Name
          description: Human-readable name for the key
        description:
          anyOf:
            - type: string
              maxLength: 1000
            - type: "null"
          title: Description
          description: Description of what this key is used for
        tier:
          type: string
          title: Tier
          description: "Rate limit tier: free, basic, pro, enterprise"
          default: free
        expires_in_days:
          anyOf:
            - type: integer
              maximum: 365
              minimum: 1
            - type: "null"
          title: Expires In Days
          description: Key expiration in days (optional)
        owner_id:
          anyOf:
            - type: string
              maxLength: 64
            - type: "null"
          title: Owner Id
          description: Owner user ID (Clerk user ID)
        owner_email:
          anyOf:
            - type: string
              maxLength: 255
            - type: "null"
          title: Owner Email
          description: Owner email for notifications
      type: object
      title: CreateKeyRequest
      description: Request to create a new API key.
    HTTPValidationError:
      properties:
        detail:
          items:
            $ref: "#/components/schemas/ValidationError"
          type: array
          title: Detail
      type: object
      title: HTTPValidationError
    PortfolioPosition:
      properties:
        symbol:
          type: string
          title: Symbol
        weight:
          type: number
          title: Weight
          description: Portfolio weight (0-1)
        asset_type:
          type: string
          title: Asset Type
          default: auto
      type: object
      required:
        - symbol
        - weight
      title: PortfolioPosition
      description: Single position in a portfolio.
    PortfolioRiskRequest:
      properties:
        positions:
          items:
            $ref: "#/components/schemas/PortfolioPosition"
          type: array
          title: Positions
        period_days:
          type: integer
          maximum: 365
          minimum: 30
          title: Period Days
          default: 90
      type: object
      required:
        - positions
      title: PortfolioRiskRequest
      description: Request body for portfolio risk analysis.
    ValidationError:
      properties:
        loc:
          items:
            anyOf:
              - type: string
              - type: integer
          type: array
          title: Location
        msg:
          type: string
          title: Message
        type:
          type: string
          title: Error Type
        input:
          title: Input
        ctx:
          type: object
          title: Context
      type: object
      required:
        - loc
        - msg
        - type
      title: ValidationError
    VerifyKeyRequest:
      properties:
        key:
          type: string
          title: Key
          description: The API key to verify
      type: object
      required:
        - key
      title: VerifyKeyRequest
      description: Request to verify an API key.
    app__api__identity__BatchResolveRequest:
      properties:
        queries:
          items:
            type: string
          type: array
          maxItems: 100
          minItems: 1
          title: Queries
          description: List of symbols/queries to resolve
        category:
          anyOf:
            - type: string
            - type: "null"
          title: Category
          description: "Optional category filter: CRYPTO, STOCK, etc."
      type: object
      required:
        - queries
      title: BatchResolveRequest
      description: Request for batch identity resolution.
    app__api__resolve__BatchResolveRequest:
      properties:
        symbols:
          items:
            type: string
          type: array
          maxItems: 100
          minItems: 1
          title: Symbols
        context:
          anyOf:
            - type: string
            - type: "null"
          title: Context
        expand:
          anyOf:
            - type: string
            - type: "null"
          title: Expand
          default: venues
      type: object
      required:
        - symbols
      title: BatchResolveRequest
      description: Request for batch resolution.
    app__api__search__BatchResolveRequest:
      properties:
        queries:
          items:
            type: string
          type: array
          maxItems: 50
          title: Queries
        include:
          items:
            type: string
          type: array
          title: Include
          default:
            - price
        context:
          anyOf:
            - type: string
            - type: "null"
          title: Context
      type: object
      required:
        - queries
      title: BatchResolveRequest
      description: Request for batch resolution.
  securitySchemes:
    HTTPBearer:
      type: http
      scheme: bearer
    APIKeyHeader:
      type: apiKey
      in: header
      name: X-API-Key
tags:
  - name: Resolution
    description: Resolve any symbol, contract, or hash to canonical asset data.
      Batch resolve, family grouping, and venue discovery.
  - name: Assets
    description: Asset registry — search, list, lookup by identifier, OHLCV price
      history, and cache stats.
  - name: Search
    description: Unified search across all asset types, contract lookup, and AI
      agent batch resolve.
  - name: Families
    description: Asset family grouping — BTC family includes WBTC, cbBTC, tBTC.
      Unified pricing across variants.
  - name: Universe
    description: Browse the full asset registry by category — crypto, stocks, ETFs,
      indexes. Coverage stats.
  - name: Analysis
    description: Edge case analysis — multi-layer derivatives, bridged tokens,
      rebrands, forks, copycat detection.
  - name: Crypto
    description: Crypto prices, trending tokens, DEX data, liquidity pools, on-chain
      analytics, social sentiment.
  - name: DeFi
    description: Protocol TVL, yields, stablecoins, bridges, gas prices, wallet balances.
  - name: Stocks
    description: Stock quotes, fundamentals, earnings, dividends, ETFs, market
      indexes, sectors.
  - name: Forex & Commodities
    description: Forex rates, tradeable currency pairs, commodity prices, technicals.
  - name: Macro Economics
    description: Fed rate, inflation, GDP, treasury yields, employment, M2 supply —
      powered by FRED.
  - name: Signals & Technicals
    description: Trading signals, technical indicators, support/resistance, risk
      metrics, orderbook depth.
  - name: News & Calendar
    description: Crypto and stock news, earnings calendar, economic calendar,
      historical data.
  - name: Predictions
    description: Prediction markets (Polymarket, Kalshi), sports betting odds,
      arbitrage detection.
  - name: Developer
    description: API key management, usage tracking, SDK generation, agent tools and
      schemas.
