  /valuation/{symbol}/dcf:
    get:
      tags:
        - Stocks
      summary: Simple DCF valuation estimate
      description: >-
        Calculate a simplified Discounted Cash Flow (DCF) valuation for a stock.


        **Methodology:**

        1. Uses current Free Cash Flow (FCF) as base

        2. Projects FCF growth for 5 years

        3. Calculates terminal value

        4. Discounts to present value


        **Inputs (configurable):**

        - Growth rate (default: based on historical growth)

        - Discount rate (default: 10%)

        - Terminal growth (default: 2.5%)


        **Output:**

        - Estimated intrinsic value per share

        - Upside/downside potential vs current price


        **Note:** This is a simplified model. Real DCF requires more detailed
        analysis.
      operationId: get_dcf_valuation_valuation__symbol__dcf_get
      parameters:
        - name: symbol
          in: path
          required: true
          schema:
            type: string
            description: Stock symbol
            title: Symbol
          description: Stock symbol
        - name: growth_rate
          in: query
          required: false
          schema:
            anyOf:
              - type: number
                maximum: 0.5
                minimum: -0.5
              - type: "null"
            description: FCF growth rate (e.g., 0.10 for 10%)
            title: Growth Rate
          description: FCF growth rate (e.g., 0.10 for 10%)
        - name: discount_rate
          in: query
          required: false
          schema:
            type: number
            maximum: 0.2
            minimum: 0.05
            description: Discount rate / WACC
            default: 0.1
            title: Discount Rate
          description: Discount rate / WACC
        - name: terminal_growth
          in: query
          required: false
          schema:
            type: number
            maximum: 0.04
            minimum: 0
            description: Terminal growth rate
            default: 0.025
            title: Terminal Growth
          description: Terminal growth rate
