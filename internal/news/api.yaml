  /crypto/price/{symbol}:
    get:
      tags:
        - Crypto
      summary: Get Consensus Price
      description: >-
        Get consensus price from multiple exchanges.


        FAST PATH: Reads from consensus cache (updated every 2 min by background
        task).

        SLOW PATH: If cache miss or force_refresh, fetches live from all
        sources.


        Supports canonical ID resolution:

        - asset_id: Full canonical ID
        (asset-token-btc-native-bitcoin-S1A2B3C4D5E6F7A8B9C0)

        - query: Symbol or hash_id to resolve

        - symbol: Path parameter


        Sources (6 total):

        - coinbase: US regulated (FREE)

        - okx: Global derivatives (FREE)

        - defillama: DeFi aggregator (FREE)

        - coingecko: Aggregator fallback (PAID)

        - moralis: On-chain data (PAID)

        - fmp: TradFi/macro (PAID)


        Args:
            symbol: Asset symbol in path (e.g., BTC, ETH, SOL)
            asset_id: Canonical asset ID for precise lookup
            query: Alternative query param (resolves to canonical)
            include_sources: Only use these sources (comma-separated)
            exclude_sources: Skip these sources (comma-separated)
            force_refresh: Bypass cache and fetch live data

        Returns:
            Consensus price with confidence score, source breakdown, and asset_id
      operationId: get_consensus_price_crypto_price__symbol__get
      parameters:
        - name: symbol
          in: path
          required: true
          schema:
            type: string
            title: Symbol
        - name: asset_id
          in: query
          required: false
          schema:
            type: string
            description: Canonical asset ID (e.g.,
              asset-token-btc-native-bitcoin-S1A2B3C4D5E6F7A8B9C0)
            title: Asset Id
          description: Canonical asset ID (e.g.,
            asset-token-btc-native-bitcoin-S1A2B3C4D5E6F7A8B9C0)
        - name: q
          in: query
          required: false
          schema:
            type: string
            description: Query to resolve (symbol or hash_id)
            title: Q
          description: Query to resolve (symbol or hash_id)
        - name: include_sources
          in: query
          required: false
          schema:
            type: string
            description: Comma-separated sources to include
            title: Include Sources
          description: Comma-separated sources to include
        - name: exclude_sources
          in: query
          required: false
          schema:
            type: string
            description: Comma-separated sources to exclude
            title: Exclude Sources
          description: Comma-separated sources to exclude
        - name: force_refresh
          in: query
          required: false
          schema:
            type: boolean
            description: Bypass cache and fetch live
            default: false
            title: Force Refresh
          description: Bypass cache and fetch live
      responses:
