  /world/vessels:
    get:
      tags:
        - World Monitoring
      summary: List Vessels
      description: >-
        Collect vessel updates from AIS Stream websocket.


        LLM helper:

        - `bbox` is parsed as `lat1,lon1,lat2,lon2`; invalid values fall back to
        default region.

        - `timeout` controls collection window; `max_vessels` caps message
        volume.

        - `vessels_collected=0` with HTTP 200 indicates no messages in window
        (provider/network/coverage), not necessarily endpoint failure.
      operationId: list_vessels_world_vessels_get
      parameters:
        - name: bbox
          in: query
          required: false
          schema:
            type: string
            description: "Bounding box as lat1,lon1,lat2,lon2 (default: Strait of Hormuz)"
            default: 24.0,54.0,27.0,58.0
            title: Bbox
