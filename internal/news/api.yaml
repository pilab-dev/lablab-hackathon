  /risk/{symbol}/var:
    get:
      tags:
        - Signals & Technicals
      summary: Calculate Value at Risk
      description: >-
        Calculate Value at Risk (VaR) and Conditional VaR for an asset.


        **What is VaR?**

        VaR estimates the potential loss over a given time period at a specific
        confidence level.

        For example, a 95% 1-day VaR of 5% means there's a 5% chance of losing
        more than 5% in a day.


        **Metrics:**

        - 1-day VaR at specified confidence

        - 10-day VaR (using square root of time)

        - Conditional VaR (Expected Shortfall) - average loss when VaR is
        exceeded
      operationId: get_value_at_risk_risk__symbol__var_get
      parameters:
        - name: symbol
          in: path
          required: true
          schema:
            type: string
            description: Asset symbol
            title: Symbol
          description: Asset symbol
        - name: asset_type
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/AssetType"
            description: Asset type
            default: auto
