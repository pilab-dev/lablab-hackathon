            "object": "asset_identity",
            "asset_id": "asset-token-btc-native-bitcoin-S1A2B3C4D5E6F7A8B9C0",
            "hash_id": "S1A2B3C4D5E6F7A8B9C0",
            "symbol": "BTC",
            "name": "Bitcoin",
            "category": "CRYPTO",
            "chain": "bitcoin",
            ...
        }

        ```
      operationId: resolve_identity_identity_resolve_get
      parameters:
        - name: q
          in: query
          required: true
          schema:
            type: string
            description: "Query to resolve: symbol (BTC), hash_id (S1A2B3C4D5E6F7A8B9C0), or
              asset_id"
            title: Q
          description: "Query to resolve: symbol (BTC), hash_id (S1A2B3C4D5E6F7A8B9C0), or
            asset_id"
        - name: category
          in: query
          required: false
          schema:
            type: string
            description: "Category filter: CRYPTO, STOCK, ETF, COMMODITY, INDEX, FOREX"
            title: Category
          description: "Category filter: CRYPTO, STOCK, ETF, COMMODITY, INDEX, FOREX"
        - name: chain
          in: query
          required: false
          schema:
            type: string
            description: "Chain filter for crypto: ethereum, solana, base"
            title: Chain
          description: "Chain filter for crypto: ethereum, solana, base"
        - name: expand
          in: query
          required: false
          schema:
            type: string
            description: "Fields to expand: venues"
            title: Expand
          description: "Fields to expand: venues"
