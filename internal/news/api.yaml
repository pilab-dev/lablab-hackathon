  /odds/arbitrage:
    get:
      tags:
        - Predictions
      summary: Find Arbitrage Opportunities
      description: >-
        Find arbitrage opportunities across all platforms.


        Scans prediction markets and sportsbooks for guaranteed profit
        opportunities

        where the combined odds across platforms create an arbitrage situation.


        **What is arbitrage?**

        When you can bet on all outcomes of an event across different platforms

        and guarantee a profit regardless of the result.


        **Example:**

        - Platform A: Team X wins @ 2.10

        - Platform B: Team Y wins @ 2.10

        - Combined implied probability: 47.6% + 47.6% = 95.2% (< 100%)

        - Profit margin: 4.8%


        **Warning:** Arbitrage opportunities are often short-lived (seconds to
        minutes).

        Always verify odds before placing bets.


        **Examples:**

        - `/odds/arbitrage` - All current opportunities

        - `/odds/arbitrage?category=sports&min_profit_pct=2` - Sports arbs with
        2%+ profit
      operationId: find_arbitrage_opportunities_odds_arbitrage_get
      parameters:
        - name: category
          in: query
          required: false
          schema:
            type: string
            description: "Category: sports, predictions, crypto"
            title: Category
          description: "Category: sports, predictions, crypto"
        - name: min_profit_pct
          in: query
          required: false
          schema:
            type: number
            maximum: 20
            minimum: 0.1
            description: Minimum profit percentage
            default: 1
            title: Min Profit Pct
          description: Minimum profit percentage
        - name: max_stake
          in: query
          required: false
          schema:
            anyOf:
              - type: number
              - type: "null"
            description: Maximum total stake in USD
            title: Max Stake
          description: Maximum total stake in USD
        - name: include_expired
          in: query
          required: false
          schema:
            type: boolean
            description: Include opportunities that may have expired
            default: false
            title: Include Expired
          description: Include opportunities that may have expired
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            maximum: 100
            minimum: 1
            description: Maximum results
            default: 20
            title: Limit
          description: Maximum results
      responses:
        "200":
          description: Successful Response
          content:
            application/json:
              schema: {}
        "422":
