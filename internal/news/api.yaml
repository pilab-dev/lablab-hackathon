        This is the primary entry point for identity resolution. Given any

        identifier format, returns the canonical asset_id and full metadata.


        **Supported Query Formats:**

        - Symbol: `BTC`, `ETH`, `AAPL`

        - Hash ID: `S1A2B3C4D5E6F7A8B9C0` (20-hex hash)

        - Asset ID: `asset-token-btc-native-bitcoin-S1A2B3C4D5E6F7A8B9C0` (full
        canonical ID)

        - Contract: `0x1234...` (for crypto tokens)


        **Examples:**

        ```

        GET /identity/resolve?q=BTC

        GET /identity/resolve?q=S1A2B3C4D5E6F7A8B9C0

        GET /identity/resolve?q=AAPL&category=STOCK

        GET /identity/resolve?q=BTC&expand=venues

        ```


        **Response:**

        ```json

